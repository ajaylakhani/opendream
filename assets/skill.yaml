# open-dream skill configuration
# Edit this file to tune behaviour — no code changes needed.

# ── Agent CLI ─────────────────────────────────────────────────
# The script delegates all LLM generation to the agent CLI.
# The agent uses its own configured model — no API keys needed here.
agent: auto  # auto | openclaw | hermes

# ── Sleep architecture ─────────────────────────────────────────
sleep_cycles:
  nrem_duration_mins: 50   # silence before each REM burst
  rem_durations_mins:      # dream burst per cycle (grows across night)
    - 10                   # cycle 1 — Emotional Review
    - 15                   # cycle 2 — Creative Association
    - 20                   # cycle 3 — Cognitive Processing
    - 30                   # cycle 4 — Memory Consolidation
    - 45                   # cycle 5 — Future Simulation

# ── Dream generation ───────────────────────────────────────────
dream_interval_seconds: 30  # how often a thought is generated in REM
                            # 30s = ~20 thoughts per 10min REM window

# ── Output ─────────────────────────────────────────────────────
output:
  path: ~/.openclaw/workspace/dreams   # overridden by OPENDREAM_OUTPUT env var

# ── Morning note ───────────────────────────────────────────────
morning_note:
  enabled: true
  max_tokens: 150

# ── Context sources ────────────────────────────────────────────
# Paths to files the script reads at 23:00 for dream context.
# All are optional — missing files are silently skipped.
context:
  # OpenClaw session JSONL — auto-detected from ~/.openclaw/agents/
  # Set agent_id to match your OpenClaw agent configuration
  agent_id: default

  # Optional cached context files written by other skills
  reminders: ~/.openclaw/workspace/reminders.json
  calendar:   ~/.openclaw/workspace/calendar.json
  tfl_cache:  ~/.openclaw/workspace/tfl_cache.json
  weather_cache: ~/.openclaw/workspace/weather_cache.json

# ── Test mode ──────────────────────────────────────────────────
# When running with --test-mode, overrides timing for fast testing
test_mode:
  nrem_duration_mins: 0    # skip NREM entirely
  rem_durations_mins: [1, 1, 1, 1, 1]  # 1 minute per cycle
  dream_interval_seconds: 5
